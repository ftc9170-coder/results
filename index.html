<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة د. صابر الفطيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #d4af37; --bg: #f4f7f9; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; padding: 15px; }
        .main-card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid var(--primary); }
        .logo-img { width: 100px; margin-bottom: 10px; }
        h1 { color: var(--primary); font-size: 18px; margin: 5px 0; font-weight: 900; }
        h2 { color: var(--accent); font-size: 16px; margin: 0 0 20px 0; font-weight: 700; }
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #e2e8f0; border-radius: 12px; text-align: center; font-family: 'Cairo'; font-weight: bold; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        
        #resultBox { display: none; margin-top: 25px; border-top: 2px solid #f0f0f0; padding-top: 20px; }
        
        /* تنسيق عمودي إجباري بسيط جداً لمنع أي تداخل */
        .box-item {
            background: #f8fafc;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            display: block; /* هذا يضمن أنها تحت بعضها دائماً */
            text-align: right;
        }

        .item-label { font-size: 14px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
        .item-score { font-size: 20px; font-weight: 900; color: var(--primary); display: block; }
        .item-max { color: #94a3b8; font-size: 14px; font-weight: normal; }

        .final-banner { margin-top: 20px; background: linear-gradient(135deg, var(--primary), #004a99); color: white; padding: 20px; border-radius: 15px; }
        .total-num { font-size: 34px; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .footer { margin-top: 25px; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="image_166501.jpg" alt="Logo" class="logo-img">
    <h1>المعهد العالي للعلوم والتقنية</h1>
    <h2>المنصة الرقمية للدكتور صابر الفطيسي</h2>
    <div class="search-area">
        <input type="text" id="studentId" placeholder="أدخل رقم القيد">
        <button id="searchBtn" onclick="searchResult()">استعلام عن النتيجة</button>
    </div>

    <div id="resultBox">
        <div id="dispName" style="font-size: 20px; font-weight: 900; color: #333; margin-bottom: 20px;"></div>
        
        <div class="box-item">
            <span class="item-label">عملي نصفي</span>
            <span class="item-score"><span id="val1"></span> <span class="item-max">/ 15</span></span>
        </div>
        <div class="box-item">
            <span class="item-label">نظري نصفي</span>
            <span class="item-score"><span id="val2"></span> <span class="item-max">/ 25</span></span>
        </div>
        <div class="box-item">
            <span class="item-label">النهائي العملي</span>
            <span class="item-score"><span id="val3"></span> <span class="item-max">/ 15</span></span>
        </div>
        <div class="box-item">
            <span class="item-label">نظري نهائي</span>
            <span class="item-score"><span id="val4"></span> <span class="item-max">/ 45</span></span>
        </div>

        <div class="final-banner">
            <div style="font-size: 14px; opacity: 0.9;">المجموع النهائي</div>
            <div class="total-num"><span id="valTotal"></span> <small style="font-size:20px; color:white;">/ 100</small></div>
            <div id="valGrade" style="font-size: 19px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; margin-top: 5px;"></div>
        </div>
    </div>
    <div class="footer">جميع الحقوق محفوظة &copy; د. صابر الفطيسي - 2026</div>
</div>

<script>
    async function searchResult() {
        const id = document.getElementById('studentId').value.trim();
        const btn = document.getElementById('searchBtn');
        if(!id) return;
        btn.innerText = "جاري البحث...";
        btn.disabled = true;
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzh7xlyzMsJ6KCIU1d5bw_cELhxxizrfMCIdKgrcqUNfPE9753cYYtx4gaa-2ccdaX7/exec"; 
        try {
            const response = await fetch(scriptUrl + "?v=" + Date.now());
            const rows = await response.json();
            const student = rows.find(r => String(r[0]).trim() === id);
            if (student) {
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('dispName').innerText = student[1];
                document.getElementById('val1').innerText = student[2] || '0';
                document.getElementById('val2').innerText = student[3] || '0';
                document.getElementById('val3').innerText = student[4] || '⏳';
                document.getElementById('val4').innerText = student[5] || '⏳';
                document.getElementById('valTotal').innerText = student[6] || '0';
                document.getElementById('valGrade').innerText = "التقدير: " + (student[7] || '--');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else { alert("رقم القيد غير موجود"); }
        } catch (e) { alert("حدث خطأ في الاتصال"); }
        finally { btn.innerText = "استعلام عن النتيجة"; btn.disabled = false; }
    }
</script>
</body>
</html>
