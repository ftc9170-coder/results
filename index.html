<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة د. صابر الفطيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #d4af37; --bg: #f4f7f9; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; padding: 10px; direction: rtl; }
        .main-card { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 6px solid var(--primary); box-sizing: border-box; }
        .logo-img { width: 100px; margin-bottom: 10px; }
        h1 { color: var(--primary); font-size: 19px; margin: 10px 0; font-weight: 900; line-height: 1.5; }
        h2 { color: var(--accent); font-size: 17px; margin: 0 0 25px 0; font-weight: 700; }
        input { width: 100%; padding: 15px; font-size: 19px; border: 2px solid #e2e8f0; border-radius: 12px; text-align: center; font-family: 'Cairo'; font-weight: bold; box-sizing: border-box; outline: none; margin-bottom: 12px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        #resultsContainer { display: none; margin-top: 25px; text-align: right; }
        .student-header { background: #f0f4f8; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #d1d9e0; }
        
        .subject-card { background: white; border: 2px solid var(--primary); border-radius: 15px; padding: 15px; margin-bottom: 25px; }
        .subject-title { background: var(--primary); color: white; padding: 5px 15px; border-radius: 8px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        
        .box-item { background: #f8fafc; margin-bottom: 8px; padding: 12px 15px; border-radius: 10px; border: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; }
        .item-label { font-size: 14px; color: #64748b; font-weight: bold; }
        .item-score { font-size: 18px; font-weight: 900; color: var(--primary); }
        
        .final-banner { margin-top: 15px; background: linear-gradient(135deg, var(--primary), #004a99); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .total-num { font-size: 28px; font-weight: 900; color: var(--accent); }
        .footer { margin-top: 30px; font-size: 12px; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="image_166501.jpg" alt="Logo" class="logo-img">
    <h1>المعهد العالي للعلوم والتقنية - سوق الخميس امسيحل</h1>
    <h2>المنصة الرقمية للدكتور صابر الفطيسي</h2>

    <input type="text" id="studentId" placeholder="أدخل رقم القيد">
    <button id="searchBtn" onclick="searchResult()">استعلام عن النتائج</button>

    <div id="resultsContainer">
        <div class="student-header">
            <div style="font-size: 14px; color: #64748b;">اسم الطالب</div>
            <div id="dispName" style="font-size: 20px; font-weight: 900; color: #333;"></div>
        </div>
        <div id="subjectsList"></div>
    </div>
    
    <div class="footer">جميع الحقوق محفوظة &copy; د. صابر الفطيسي - 2026</div>
</div>

<script>
    async function searchResult() {
        const id = document.getElementById('studentId').value.trim();
        const btn = document.getElementById('searchBtn');
        const list = document.getElementById('subjectsList');
        if(!id) return;
        
        btn.innerText = "جاري البحث...";
        btn.disabled = true;
        list.innerHTML = ""; 

        const scriptUrl = "https://script.google.com/macros/s/AKfycbzh7xlyzMsJ6KCIU1d5bw_cELhxxizrfMCIdKgrcqUNfPE9753cYYtx4gaa-2ccdaX7/exec"; 

        try {
            const response = await fetch(scriptUrl + "?v=" + Date.now());
            const rows = await response.json();
            
            const studentRecords = rows.filter(r => String(r[0]).trim() === id);

            if (studentRecords.length > 0) {
                document.getElementById('resultsContainer').style.display = 'block';
                document.getElementById('dispName').innerText = studentRecords[0][1];

                studentRecords.forEach(record => {
                    // معالجة المجموع: "قيد الرصد" إذا كانت الخانة فارغة
                    const totalScore = (record[7] === "" || record[7] === undefined) ? "قيد الرصد" : record[7];
                    const totalDisplay = (totalScore === "قيد الرصد") ? totalScore : totalScore + " / 100";

                    const card = `
                        <div class="subject-card">
                            <div class="subject-title">${record[2] || 'المادة'}</div>
                            <div class="box-item"><span class="item-label">عملي نصفي</span><span class="item-score">${record[3] || record[3] === 0 ? record[3] : '⏳'} / 15</span></div>
                            <div class="box-item"><span class="item-label">نظري نصفي</span><span class="item-score">${record[4] || record[4] === 0 ? record[4] : '⏳'} / 25</span></div>
                            <div class="box-item"><span class="item-label">النهائي العملي</span><span class="item-score">${record[5] || record[5] === 0 ? record[5] : '⏳'} / 15</span></div>
                            <div class="box-item"><span class="item-label">النهائي النظري</span><span class="item-score">${record[6] || record[6] === 0 ? record[6] : '⏳'} / 45</span></div>
                            <div class="final-banner">
                                <div style="font-size: 13px; opacity: 0.9;">المجموع النهائي</div>
                                <div class="total-num">${totalDisplay}</div>
                                <div style="font-size: 16px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 5px; margin-top: 5px;">التقدير: ${record[8] || '--'}</div>
                            </div>
                        </div>
                    `;
                    list.innerHTML += card;
                });
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else { alert("رقم القيد غير موجود"); }
        } catch (e) { alert("حدث خطأ في الاتصال"); }
        finally { btn.innerText = "استعلام عن النتائج"; btn.disabled = false; }
    }
</script>
</body>
</html>
